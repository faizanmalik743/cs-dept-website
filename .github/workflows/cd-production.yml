# ============================================================
# CD Pipeline — PRODUCTION Environment
# Trigger: push to `main` branch
# Requires: GitHub Environment "production" approval gate
# Deploys to: Render.com Production service
# ============================================================
name: CD — Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a production deploy mid-flight

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Pre-deployment validation
  # ──────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify all required pages exist
        run: |
          echo "=== Verifying required pages ==="
          FAIL=0
          for page in index.html courses.html faculty.html admissions.html contact.html; do
            if [ ! -f "src/$page" ]; then
              echo "❌ Missing: src/$page"
              FAIL=1
            else
              echo "✅ Found: src/$page"
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Verify Dockerfile exists
        run: |
          [ -f Dockerfile ] && echo "✅ Dockerfile found" || { echo "❌ Dockerfile missing"; exit 1; }
          [ -f nginx.conf ] && echo "✅ nginx.conf found" || { echo "❌ nginx.conf missing"; exit 1; }

  # ──────────────────────────────────────────
  # JOB 2: Build Docker image for production
  # ──────────────────────────────────────────
  build-production:
    name: Build Production Docker Image
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Build and push production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:latest
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:prod-${{ steps.sha.outputs.short }}
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run final smoke test on production image
        run: |
          docker run -d --name prod-test -p 8082:80 \
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:latest
          sleep 5

          echo "=== Production Smoke Tests ==="
          FAIL=0
          for page in "" "index.html" "courses.html" "faculty.html" "admissions.html" "contact.html"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8082/$page")
            if [ "$STATUS" -ne 200 ]; then
              echo "  ❌ FAIL /$page → HTTP $STATUS"
              FAIL=1
            else
              echo "  ✅ PASS /$page → HTTP $STATUS"
            fi
          done

          docker stop prod-test && docker rm prod-test
          [ "$FAIL" -eq 0 ] || exit 1
          echo "✅ All production smoke tests passed."

  # ──────────────────────────────────────────
  # JOB 3: Deploy to Production (with env gate)
  # The "production" GitHub Environment should
  # have required reviewers configured — this
  # creates the mandatory approval step.
  # ──────────────────────────────────────────
  deploy-production:
    name: Deploy → Production (Requires Approval)
    runs-on: ubuntu-latest
    needs: build-production
    environment: production   # ← Approval gate is configured here in GitHub

    steps:
      - name: Trigger Render Deploy Hook (Production)
        run: |
          echo "Triggering deployment to PRODUCTION environment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}")
          echo "Render API response: HTTP $RESPONSE"
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Production deployment triggered"

      - name: Wait for Production deployment
        run: |
          echo "Waiting 90 seconds for Render to deploy..."
          sleep 90

      - name: Verify Production URL is live
        run: |
          URL="${{ secrets.PROD_SITE_URL }}"
          echo "Checking $URL ..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Production site is LIVE!"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️  Site may still be starting — check Render dashboard."

      - name: Production deployment summary
        run: |
          echo "======================================================="
          echo "  ✅ PRODUCTION DEPLOYMENT COMPLETE"
          echo "  URL     : ${{ secrets.PROD_SITE_URL }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Deployer: ${{ github.actor }}"
          echo "  Time    : $(date -u)"
          echo "======================================================="
