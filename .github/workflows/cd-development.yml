# ============================================================
# CD Pipeline — DEVELOPMENT Environment
# Trigger: push to `develop` branch
# Deploys to: Render.com Development service
# ============================================================
name: CD — Deploy to Development

on:
  push:
    branches:
      - develop

# Only one deployment at a time
concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy-development:
    name: Deploy → Development
    runs-on: ubuntu-latest
    environment: development   # GitHub Environment with protected secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build & Push Docker image to Docker Hub ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:dev-latest
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger Render.com Deployment ──
      - name: Trigger Render Deploy Hook (Development)
        run: |
          echo "Triggering deployment to Development environment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}")
          echo "Render API response: HTTP $RESPONSE"
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Deployment triggered successfully"

      # ── Wait & Verify Deployment ──
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Verify Development URL is live
        run: |
          URL="${{ secrets.DEV_SITE_URL }}"
          echo "Checking $URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Development site is live!"
          else
            echo "⚠️  Site returned HTTP $STATUS — may still be deploying."
          fi

      - name: Deployment summary
        run: |
          echo "========================================="
          echo " Deployed to: DEVELOPMENT"
          echo " URL       : ${{ secrets.DEV_SITE_URL }}"
          echo " Image     : dev-${{ github.sha }}"
          echo " Branch    : ${{ github.ref_name }}"
          echo " Time      : $(date -u)"
          echo "========================================="
